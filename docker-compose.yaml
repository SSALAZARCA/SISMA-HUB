version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sisma_db
    restart: always
    environment:
      POSTGRES_USER: sisma_admin
      POSTGRES_PASSWORD: Ssc841209*
      POSTGRES_DB: sismadhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sisma_admin -d sismadhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sisma_net

  app:
    build: .
    container_name: sisma_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://sisma_admin:Ssc841209*@db:5432/sismadhub
      - SECRET_KEY_HMAC=SISMA_ULTRA_SECRET_KEY_2026
      - ADMIN_USER=santiago.salazar
      - ADMIN_PASS=Ssc841209*
      - HUB_PUBLIC_URL=http://localhost:10000
    ports:
      - "10000:10000"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    networks:
      - sisma_net

volumes:
  postgres_data:

networks:
  sisma_net:
    driver: bridge
