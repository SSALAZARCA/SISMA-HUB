<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ssc Login | Portal Administrativo</title>
    <link rel="stylesheet" href="/static/style.css?v=2.1">
    <link rel="stylesheet" href="/static/admin/admin.css?v=2.1">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h2 class="auth-title">🛡️ SISMA ACCESS</h2>
            <p class="auth-subtitle">CENTRO DE COMANDO GLOBAL</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>OPERADOR</label>
                    <input type="text" id="username" placeholder="Usuario de Mando" required>
                </div>
                <div class="input-group">
                    <label>LLAVE MAESTRA</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-login">VINCULAR SESIÓN</button>
            </form>
            <p id="errorMsg" class="error-text"></p>
        </div>
    </div>
    <script src="/static/admin/admin_logic.js"></script>
</body>
</html>
